name: Subdomain Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget unzip dnsutils python3-pip

          pip install requests

          # Go (simple)
          sudo snap install go --classic || true
          export PATH=$PATH:/snap/bin

          # subfinder
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          sudo mv ~/go/bin/subfinder /usr/bin/

          # assetfinder
          go install github.com/tomnomnom/assetfinder@latest
          sudo mv ~/go/bin/assetfinder /usr/bin/

          # findomain
          - name: Install findomain
            run: |
          wget -q https://github.com/Findomain/Findomain/releases/latest/download/findomain-linux.zip
          unzip -o findomain-linux.zip
          chmod +x findomain
          sudo mv findomain /usr/bin/

          # chaos
          go install github.com/projectdiscovery/chaos-client/cmd/chaos@latest
          sudo mv ~/go/bin/chaos /usr/bin/

          # dnscan
          git clone https://github.com/rbsec/dnscan.git

      - name: Run subdomain monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PDCP_API_KEY: ${{ secrets.PDCP_API_KEY }}
        run: python monitor.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add results/
          git diff --cached --quiet || git commit -m "update results $(date -u)"
          git push
